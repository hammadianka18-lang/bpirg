{% extends "base.html" %}

{% block title %}Email envoyé | ISRA{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="card shadow-lg border-0 rounded-4 p-4">
            <div class="card-body">
                <div class="mb-4">
                    <i class="bi bi-check2-circle text-success" style="font-size: 4rem;"></i>
                </div>
                <h3 class="fw-bold">Lien envoyé !</h3>
                <p class="text-muted mt-3">
                    Si un compte existe avec cet email, vous recevrez sous peu les instructions pour réinitialiser votre mot de passe.
                </p>
                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-primary rounded-pill px-4 fw-bold">
                        Retour à la connexion
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    {% if not user.is_authenticated %}
    .sidebar, .top-navbar { display: none !important; }
    .main-content { margin-left: 0 !important; padding-top: 2rem !important; }
    body { background: #f8f9fc; }
    {% endif %}
</style>
{% endblock %}
