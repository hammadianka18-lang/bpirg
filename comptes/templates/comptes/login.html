{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | ISRA BPIRG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --isra-green: #1a4d2e;
            --isra-light-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Arrière-plan thématique : Mélange de vert nature et de bleu scientifique avec motif organique */
            background-color: #e2e8f0;
            background-image:
                radial-gradient(at 0% 0%, rgba(26, 77, 46, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 41, 59, 0.1) 0px, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 50 Q35 30 50 30 T70 50 T50 70 T30 50' stroke='%231a4d2e' stroke-width='0.5' fill='none' opacity='0.1'/%3E%3Ccircle cx='50' cy='50' r='2' fill='%231a4d2e' opacity='0.1'/%3E%3Cpath d='M10 10 Q20 5 30 10' stroke='%231a4d2e' stroke-width='0.5' fill='none' opacity='0.1'/%3E%3C/svg%3E");
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* Carte de connexion compacte */
        .login-card {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* En-tête avec identité BPIRG */
        .login-header {
            background: var(--isra-green);
            padding: 1.5rem;
            text-align: center;
            color: white;
            position: relative;
        }

        /* Petit rappel visuel des ressources (ADN/Feuille) */
        .login-header::after {
            content: "\f471";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            bottom: 10px;
            right: 15px;
            opacity: 0.15;
            font-size: 1.5rem;
        }

        .login-header img {
            height: 45px;
            background: white;
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }

        .login-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.1rem;
            letter-spacing: 0.5px;
        }

        .login-body {
            padding: 2rem;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .isra-input {
            padding: 10px 12px;
            font-size: 0.9rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        .isra-input:focus {
            border-color: var(--isra-green);
            box-shadow: 0 0 0 3px rgba(26, 77, 46, 0.1);
            background-color: #fff;
            outline: none;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
        }

        .btn-isra {
            background-color: var(--isra-green);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            margin-top: 1rem;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .btn-isra:hover {
            background-color: #123620;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 77, 46, 0.2);
        }

        .login-footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: #64748b;
            border-top: 1px solid #f1f5f9;
            background: #f8fafc;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <img src="{% static 'images/isra_logo.png' %}" alt="Logo ISRA">
        <h3>Institut Sénégalais de Recherches Agricoles | BPIRG</h3>
<!--        <p class="small mb-0 opacity-75">Bureau de la Propriété Intellectuelle et des Ressources Génétiques </p>-->
    </div>

    <div class="login-body">
        {% if form.errors %}
        <div class="alert alert-danger border-0 small py-2 rounded-3 mb-3">
            <i class="fas fa-dna me-2"></i> Identifiants incorrects.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Utilisateur</label>
                <input type="text" name="username" class="form-control isra-input" placeholder="nom.prenom" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="passwordInput" class="form-control isra-input" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label small text-muted" for="remember">Rester connecté</label>
                </div>
                <a href="#" class="small text-decoration-none fw-bold" style="color: var(--isra-green);">Aide ?</a>
            </div>

            <button type="submit" class="btn btn-isra">
                Accéder au portail <i class="fas fa-leaf ms-2"></i>
            </button>
        </form>
    </div>

    <div class="login-footer">
        Bureau de la Propriété Intellectuelle et des Ressources Génétiques<br>
        &copy; 2026 ISRA SÉNÉGAL
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const passwordInput = document.querySelector('#passwordInput');

    togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
    });
</script>

</body>
</html>
