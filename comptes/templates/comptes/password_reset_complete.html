{% extends "base.html" %}

{% block title %}Mot de passe changé | ISRA{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="card shadow-lg border-0 rounded-4 p-4 text-success">
            <div class="card-body">
                <i class="bi bi-shield-check" style="font-size: 4rem;"></i>
                <h3 class="fw-bold text-dark mt-3">Mot de passe mis à jour !</h3>
                <p class="text-muted">Votre nouveau mot de passe est désormais actif.</p>
                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-primary rounded-pill px-5 fw-bold">Se connecter</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
